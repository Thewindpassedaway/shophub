<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景圆角矩形 -->
  <rect x="0" y="0" width="512" height="512" rx="100" fill="url(#grad)"/>
  
  <!-- 简约商店图标 -->
  <g fill="white" opacity="0.95">
    <!-- 屋顶 -->
    <path d="M 106 200 L 256 106 L 406 200 L 376 200 L 256 136 L 136 200 Z"/>
    
    <!-- 建筑主体 -->
    <rect x="136" y="220" width="240" height="180" rx="8"/>
    
    <!-- 门 -->
    <rect x="226" y="280" width="60" height="120" rx="4" fill="url(#grad)" opacity="0.3"/>
    
    <!-- 左侧窗户 -->
    <rect x="166" y="250" width="40" height="40" rx="4" fill="url(#grad)" opacity="0.3"/>
    
    <!-- 右侧窗户 -->
    <rect x="306" y="250" width="40" height="40" rx="4" fill="url(#grad)" opacity="0.3"/>
  </g>
</svg>
