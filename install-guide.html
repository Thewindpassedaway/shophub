<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>安装ShopHub</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .guide-card {
      background: white;
      border-radius: 24px;
      padding: 40px 30px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .guide-icon {
      text-align: center;
      font-size: 64px;
      margin-bottom: 20px;
    }

    .guide-title {
      text-align: center;
      font-size: 24px;
      font-weight: 600;
      color: #333;
      margin-bottom: 10px;
    }

    .guide-subtitle {
      text-align: center;
      font-size: 14px;
      color: #888;
      margin-bottom: 30px;
    }

    .steps {
      margin-bottom: 30px;
    }

    .step {
      display: flex;
      align-items: flex-start;
      gap: 15px;
      margin-bottom: 20px;
      padding: 15px;
      background: #f9f9f9;
      border-radius: 12px;
    }

    .step-number {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .step-content h4 {
      font-size: 15px;
      color: #333;
      margin-bottom: 5px;
    }

    .step-content p {
      font-size: 13px;
      color: #666;
      line-height: 1.5;
    }

    .btn-back {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-back:active {
      transform: scale(0.98);
    }

    .android-tip, .ios-tip {
      display: none;
    }

    .android-tip.show, .ios-tip.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="guide-card">
    <div class="guide-icon">📱</div>
    <div class="guide-title">安装ShopHub到手机</div>
    <div class="guide-subtitle">像原生App一样使用</div>

    <!-- Android步骤 -->
    <div class="steps android-tip show">
      <div class="step">
        <div class="step-number">1</div>
        <div class="step-content">
          <h4>点击浏览器菜单</h4>
          <p>点击浏览器右上角的 <strong>⋮</strong> 或 <strong>☰</strong> 按钮</p>
        </div>
      </div>

      <div class="step">
        <div class="step-number">2</div>
        <div class="step-content">
          <h4>选择"添加到主屏幕"</h4>
          <p>在菜单中找到并点击 <strong>"添加到主屏幕"</strong> 或 <strong>"安装应用"</strong></p>
        </div>
      </div>

      <div class="step">
        <div class="step-number">3</div>
        <div class="step-content">
          <h4>确认安装</h4>
          <p>点击 <strong>"添加"</strong> 或 <strong>"安装"</strong> 按钮</p>
        </div>
      </div>

      <div class="step">
        <div class="step-number">✓</div>
        <div class="step-content">
          <h4>完成!</h4>
          <p>ShopHub图标会出现在你的主屏幕上,点击即可使用</p>
        </div>
      </div>
    </div>

    <!-- iOS步骤 -->
    <div class="steps ios-tip">
      <div class="step">
        <div class="step-number">1</div>
        <div class="step-content">
          <h4>点击分享按钮</h4>
          <p>点击Safari浏览器底部的 <strong>分享图标</strong> (方形+箭头)</p>
        </div>
      </div>

      <div class="step">
        <div class="step-number">2</div>
        <div class="step-content">
          <h4>选择"添加到主屏幕"</h4>
          <p>向下滑动菜单,找到并点击 <strong>"添加到主屏幕"</strong></p>
        </div>
      </div>

      <div class="step">
        <div class="step-number">3</div>
        <div class="step-content">
          <h4>确认添加</h4>
          <p>点击右上角的 <strong>"添加"</strong> 按钮</p>
        </div>
      </div>

      <div class="step">
        <div class="step-number">✓</div>
        <div class="step-content">
          <h4>完成!</h4>
          <p>ShopHub图标会出现在你的主屏幕上</p>
        </div>
      </div>
    </div>

    <button class="btn-back" onclick="window.location.href='index.html'">返回ShopHub</button>
  </div>

  <script>
    // 检测设备类型
    const userAgent = navigator.userAgent;
    const isIOS = /iPhone|iPad|iPod/i.test(userAgent);
    const isAndroid = /Android/i.test(userAgent);

    if (isIOS) {
      document.querySelector('.android-tip').classList.remove('show');
      document.querySelector('.ios-tip').classList.add('show');
    } else if (isAndroid) {
      document.querySelector('.android-tip').classList.add('show');
      document.querySelector('.ios-tip').classList.remove('show');
    } else {
      // 桌面浏览器,显示Android步骤
      document.querySelector('.android-tip').classList.add('show');
    }
  </script>
</body>
</html>
